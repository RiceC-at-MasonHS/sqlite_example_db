services:
  web:
    build: ./flask_app
    container_name: citizen_web
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/citizens.db
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: citizen_cloudbeaver
    ports:
      - "8978:8978"
    volumes:
      - ./data:/opt/cloudbeaver/workspace/shared_data
      - ./cloudbeaver_workspace:/opt/cloudbeaver/workspace
    restart: unless-stopped

  cli:
    build: ./cli
    container_name: citizen_cli
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/citizens.db
    tty: true
    stdin_open: true
