services:
  web:
    build: ./flask_app
    container_name: citizen_web
    ports:
      - "5000:5000"
    volumes:
      - sqlite_data:/data
    environment:
      - DATABASE_PATH=/data/citizens.db
    restart: unless-stopped

  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: citizen_browser
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data
    command: sqlite_web /data/citizens.db -H 0.0.0.0
    restart: unless-stopped

  cli:
    build: ./cli
    container_name: citizen_cli
    volumes:
      - sqlite_data:/data
    environment:
      - DATABASE_PATH=/data/citizens.db
    tty: true
    stdin_open: true

volumes:
  sqlite_data:
